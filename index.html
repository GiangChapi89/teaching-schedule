<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Quản lý lịch giảng dạy tuần</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* Navbar */
        .navbar { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .navbar h2 { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500;}
        .nav-btn:hover { background: rgba(255,255,255,0.25); }
        .btn-danger-outline { border-color: #e74c3c; color: #e74c3c; background: transparent; }
        .btn-danger-outline:hover { background: #e74c3c; color: white; }

        /* Auth Form */
        #authContainer { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #3498db; display: none; }
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: 600; color: #888; transition: 0.3s; }
        .auth-tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
        .auth-form-section { display: none; }
        .auth-form-section.active { display: block; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-btn { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 5px; }

        /* User View */
        #appContainer { display: none; }
        .user-badge { background: #27ae60; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; margin-left: 10px; }

        /* ===== FORM NHẬP LIỆU THEO NGÀY (DẠNG BẢNG) ===== */
        #myScheduleForm { display: flex; flex-direction: column; gap: 30px; margin-top: 20px; }
        
        .day-schedule-block { background: #f8f9fa; border-radius: 12px; border: 1px solid #e9ecef; padding: 0; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        .day-header { background: #e9ecef; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; flex-wrap: wrap; gap: 10px; }
        .day-header h5 { margin: 0; color: #2c3e50; font-weight: 700; font-size: 1.1rem; }
        .day-header .day-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .period-table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        .period-table th { background: #f1f2f6; color: #555; padding: 8px 10px; text-align: left; border-bottom: 1px solid #ddd; font-weight: 600; }
        .period-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        .period-table tr:last-child td { border-bottom: none; }
        
        .period-table select, .period-table input { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; background: #fff; }
        .period-table .custom-input { margin-top: 4px; }
        
        .day-total-display { padding: 12px 20px; background: #fff3cd; border-top: 1px solid #ffc107; font-weight: bold; color: #856404; text-align: right; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .day-total-display .actions { display: flex; gap: 8px; }
        
        .btn-sm { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f1c40f; color: #333; }
        .btn-warning:hover { background: #d4ac0d; }
        .btn-outline-secondary { background: transparent; border: 1px solid #6c757d; color: #6c757d; }
        .btn-outline-secondary:hover { background: #6c757d; color: white; }

        /* Bảng tổng hợp */
        .table-responsive { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #2c3e50; color: white; padding: 10px; text-align: center; position: sticky; top: 0; }
        td, th { border: 1px solid #ddd; padding: 10px; text-align: center; vertical-align: top; }
        .teacher-row td:first-child { font-weight: bold; text-align: left; background: #f1f2f6; min-width: 120px; }
        .entry-cell { min-width: 150px; text-align: left; font-size: 13px; }
        .entry-item { border-bottom: 1px solid #eee; padding: 6px 0; }
        .entry-item:last-child { border-bottom: none; }
        .total-cell { font-weight: bold; color: #2980b9; }
        .grand-total-row { background: #34495e; color: white; font-weight: bold; font-size: 15px; }
        .btn-load { background: #f1c40f; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-load:hover { background: #d4ac0d; }

        /* Responsive */
        @media (max-width: 768px) {
            .period-table, .period-table thead, .period-table tbody, .period-table tr, .period-table td, .period-table th { display: block; }
            .period-table tr { margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
            .period-table td { text-align: right; padding-left: 50%; position: relative; border-bottom: none; }
            .period-table td:before { position: absolute; top: 6px; left: 10px; width: 45%; padding-right: 10px; white-space: nowrap; font-weight: bold; content: attr(data-label); }
            .period-table td:last-child { border-bottom: none; }
            .day-header { flex-direction: column; align-items: flex-start; }
            .day-header .day-controls { width: 100%; justify-content: flex-start; }
            .day-total-display { flex-direction: column; align-items: flex-start; }
            .day-total-display .actions { width: 100%; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2>📅 Lịch giảng dạy Tuần hiện tại</h2>
            <div class="nav-right" id="navRight">
                <span id="userDisplay" style="font-weight: 500; display:flex; align-items:center; gap:8px;">
                    👤 Chưa đăng nhập
                    <button id="changeNameBtn" onclick="openChangeNameModal()" style="display:none; background:rgba(255,255,255,0.2); border:none; color:white; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer;">✏️</button>
                </span>
                <button class="nav-btn" id="loginToggleBtn" onclick="toggleAuthModal()">🔑 Đăng nhập</button>
                <button class="nav-btn btn-danger-outline" id="logoutBtn" style="display:none;" onclick="doLogout()">🚪 Đăng xuất</button>
            </div>
        </div>

        <div id="authContainer">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">Đăng nhập</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">Đăng ký</div>
            </div>
            <div id="loginSection" class="auth-form-section active">
                <button class="auth-btn" onclick="doGoogleLogin()" style="background:white; color:#555; border:1px solid #ddd; margin-bottom:15px;">Đăng nhập với Google</button>
                <div class="auth-divider"><span>hoặc</span></div>
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Mật khẩu">
                <button class="auth-btn" onclick="doLogin()">Đăng nhập bằng Email</button>
            </div>
            <div id="registerSection" class="auth-form-section">
                <input type="text" id="regFullName" class="auth-input" placeholder="Họ và tên">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <input type="password" id="regPassword" class="auth-input" placeholder="Mật khẩu (tối thiểu 6 ký tự)">
                <button class="auth-btn" onclick="doRegister()">Đăng ký tài khoản</button>
            </div>
        </div>

        <div id="appContainer">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
                <h3 style="margin:0;">Bảng tổng hợp theo tuần</h3>
                <button class="btn-load" onclick="loadData()"><i class="fas fa-sync"></i> Làm mới dữ liệu</button>
            </div>
            <div id="scheduleTableContainer" class="table-responsive">
                <p style="text-align: center; color: #888; padding: 40px 0;">Đang tải dữ liệu...</p>
            </div>

            <div id="myInputSection" style="margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 30px; display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
                    <h4 style="color:#2c3e50; margin:0; display:flex; align-items:center; gap:10px;">✏️ Cập nhật lịch dạy (Theo cặp tiết) <span class="user-badge">Chỉ bạn thấy</span></h4>
                    <!-- Nút Lưu cả tuần (Dùng để lưu toàn bộ dữ liệu đã điền trên form) -->
                    <button class="btn-success" onclick="saveAllWeekData()" style="padding: 8px 20px;">💾 Lưu cả tuần</button>
                </div>
                <div id="myScheduleForm"></div>
            </div>
            
            <!-- Modal Đổi tên -->
            <div id="changeNameModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
                <div style="background:white; padding:30px; border-radius:12px; max-width:400px; width:90%; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
                    <h3 style="margin-top:0; color:#2c3e50;">✏️ Đổi tên hiển thị</h3>
                    <p style="color:#666; font-size:14px;">Tên mới sẽ được cập nhật trên bảng tổng hợp và thanh điều hướng.</p>
                    <input type="text" id="newDisplayName" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom:15px; box-sizing:border-box;" placeholder="Nhập tên mới...">
                    <div style="display:flex; gap:10px; justify-content:flex-end;">
                        <button onclick="document.getElementById('changeNameModal').style.display='none'" style="background:#95a5a6; color:white; border:none; padding:8px 20px; border-radius:6px; cursor:pointer;">Hủy</button>
                        <button onclick="updateMyName()" style="background:#3498db; color:white; border:none; padding:8px 20px; border-radius:6px; cursor:pointer;">Lưu tên</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="schedule-config.js"></script>
    <script>
        // --- 1. BIẾN TOÀN CỤC ---
        let currentUser = null;
        let currentUserRole = 'user';
        let myUserId = null;
        const currentWeek = getCurrentWeek();
        let globalCatalogs = { subjects: [], classes: [], rooms: [] };
        const DAYS = ['Thu_2', 'Thu_3', 'Thu_4', 'Thu_5', 'Thu_6', 'Thu_7'];
        const DISPLAY_DAYS = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
        const PERIODS = ['I', 'II', 'III'];
        const DEFAULT_PERIODS = 3; // Mặc định mỗi ngày có 3 cặp
        const SLOTS_PER_PERIOD = 2; // Mỗi cặp mặc định 2 tiết

        // --- 2. CÁC HÀM GIAO DIỆN ---
        function toggleAuthModal() {
            const modal = document.getElementById('authContainer');
            if (!modal) return; 
            modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.auth-form-section').forEach(el => el.classList.remove('active'));
            if(tab === 'login') {
                document.querySelector('.auth-tabs .auth-tab:first-child').classList.add('active');
                document.getElementById('loginSection').classList.add('active');
            } else {
                document.querySelector('.auth-tabs .auth-tab:last-child').classList.add('active');
                document.getElementById('registerSection').classList.add('active');
            }
        }

        // --- 3. ĐĂNG KÝ / ĐĂNG NHẬP ---
        async function doRegister() {
            const name = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value.trim();
            if(!name || !email || !pass) return alert("❌ Vui lòng điền đầy đủ!");
            if(pass.length < 6) return alert("❌ Mật khẩu phải có ít nhất 6 ký tự!");
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await cred.user.updateProfile({ displayName: name });
                await db.collection('users').doc(cred.user.uid).set({
                    fullname: name, email: email, role: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("🎉 Đăng ký thành công!");
                toggleAuthModal(); 
            } catch(e) {
                let msg = "❌ Lỗi: ";
                if(e.code === 'auth/email-already-in-use') msg += "Email đã tồn tại.";
                else msg += e.message;
                alert(msg);
            }
        }

        async function doLogin() {
            try { 
                await auth.signInWithEmailAndPassword(
                    document.getElementById('loginEmail').value.trim(), 
                    document.getElementById('loginPassword').value.trim()
                ); 
                toggleAuthModal(); 
                location.reload();
            } catch(e) {
                let msg = "❌ Lỗi: ";
                if(e.code === 'auth/wrong-password') msg += "Sai mật khẩu.";
                else if(e.code === 'auth/user-not-found') msg += "Email chưa đăng ký.";
                else msg += e.message;
                alert(msg);
            }
        }

        async function doGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                if (result.user) location.reload();
            } catch (error) {
                if (error.code === 'auth/popup-blocked' || error.code === 'auth/cross-origin-auth') {
                    alert("Popup bị chặn, chuyển hướng...");
                    try { await auth.signInWithRedirect(provider); } catch(e) { alert("Lỗi: " + e.message); }
                } else {
                    alert("Lỗi Google: " + error.message);
                }
            }
        }

        auth.getRedirectResult().then((result) => {
            if (result.user) location.reload();
        }).catch((error) => {
            console.error("Lỗi Redirect Google:", error);
        });

        async function doLogout() { await auth.signOut(); location.reload(); }

        // --- 4. AUTH STATE CHANGED ---      
        auth.onAuthStateChanged(async (user) => {
            const changeNameBtnElement = document.getElementById('changeNameBtn');
            if (user) {
                currentUser = user;
                myUserId = user.uid;
                document.getElementById('userDisplay').innerHTML = `👤 ${user.displayName || user.email}`;
                if (changeNameBtnElement) changeNameBtnElement.style.display = 'inline-block';
                
                document.getElementById('loginToggleBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';

                try {
                    const userDoc = await db.collection('users').doc(myUserId).get();
                    if (userDoc.exists) currentUserRole = userDoc.data().role || 'user';
                    else {
                        currentUserRole = 'user';
                        await db.collection('users').doc(myUserId).set({
                            fullname: user.displayName || user.email,
                            email: user.email,
                            role: 'user'
                        });
                    }

                    if (currentUserRole === 'admin' || currentUserRole === 'super_admin') {
                        document.getElementById('userDisplay').innerHTML += ` <span style="background:#e67e22;padding:2px 8px;border-radius:4px;font-size:11px;color:white;">${currentUserRole === 'super_admin' ? 'Super Admin' : 'Admin'}</span>`;
                        if (!document.querySelector('.admin-nav-link')) {
                            const adminLink = document.createElement('a');
                            adminLink.href = 'admin.html';
                            adminLink.className = 'nav-btn admin-nav-link';
                            adminLink.innerHTML = '⚙️ Quản trị';
                            adminLink.style.marginLeft = '10px';
                            document.getElementById('navRight').appendChild(adminLink);
                        }
                    }
                    await createUserRowIfNotExist();
                    // Load danh mục trước, sau đó mới load dữ liệu
                    await loadCatalogs();
                    await loadData();
                } catch (error) { console.error("Lỗi tải user:", error); }
            } else {
                currentUser = null;
                currentUserRole = 'user';
                document.getElementById('userDisplay').innerHTML = '👤 Chưa đăng nhập';
                if (changeNameBtnElement) changeNameBtnElement.style.display = 'none';
                document.getElementById('loginToggleBtn').style.display = 'inline-block';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('authContainer').style.display = 'block';
            }
        });

        // --- 5. LOGIC DỮ LIỆU & RENDER FORM ---
        async function loadCatalogs() {
            const doc = await db.collection('configs').doc('master_data').get();
            if(doc.exists) globalCatalogs = doc.data();
        }

        async function createUserRowIfNotExist() {
            const weekRef = db.collection('weeks').doc(`week_${new Date().getFullYear()}_${currentWeek}`);
            const weekDoc = await weekRef.get();
            if (!weekDoc.exists) await weekRef.set({ createdAt: firebase.firestore.FieldValue.serverTimestamp() });

            const userRowsRef = weekRef.collection('rows').doc(myUserId);
            if (!(await userRowsRef.get()).exists) {
                await userRowsRef.set({ email: currentUser.email, fullname: currentUser.displayName });
            }
        }

        async function loadData() {
            document.getElementById('scheduleTableContainer').innerHTML = '<p style="text-align:center;">Đang tải...</p>';
            try {
                const usersSnap = await db.collection('users').where('role', 'in', ['user', 'admin', 'super_admin']).get();
                let users = []; usersSnap.forEach(doc => users.push({ id: doc.id, ...doc.data() }));

                const rowsSnap = await db.collection('weeks').doc(`week_${new Date().getFullYear()}_${currentWeek}`).collection('rows').get();
                let scheduleMap = {}; rowsSnap.forEach(doc => { scheduleMap[doc.id] = doc.data(); });

                renderTable(users, scheduleMap);
                renderMyForm(scheduleMap);
            } catch(e) { document.getElementById('scheduleTableContainer').innerHTML = `<p style="color:red;">Lỗi: ${e.message}</p>`; }
        }

        // --- 6. RENDER FORM MỚI THEO BẢNG ---
        function renderMyForm(scheduleMap) {
            const section = document.getElementById('myInputSection');
            section.style.display = 'block'; 
            const formContainer = document.getElementById('myScheduleForm');
            
            let html = '';
            DAYS.forEach((dayKey, index) => {
                const displayDay = DISPLAY_DAYS[index];
                // Lấy dữ liệu hiện tại của ngày này từ Database
                const dayDataFromDB = (scheduleMap && scheduleMap[myUserId] && scheduleMap[myUserId][dayKey]) || [];
                
                html += `<div class="day-schedule-block" id="block_${dayKey}">
                    <div class="day-header">
                        <h5>${displayDay}</h5>
                        <div class="day-controls">
                            <button class="btn-sm btn-primary" onclick="addPeriodRow('${dayKey}')">+ Thêm cặp</button>
                            <button class="btn-sm btn-success" onclick="saveDay('${dayKey}')">💾 Lưu ngày</button>
                            <button class="btn-sm btn-danger" onclick="clearDay('${dayKey}')">🗑️ Xóa ngày</button>
                        </div>
                    </div>
                    <table class="period-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">Cặp</th>
                                <th>Môn học</th>
                                <th style="width: 25%;">Lớp</th>
                                <th style="width: 25%;">Phòng</th>
                                <th style="width: 60px; text-align:center;">Tiết</th>
                            </tr>
                        </thead>
                        <tbody id="tbody_${dayKey}">
                            <!-- Các dòng cặp tiết sẽ được render ở đây -->
                        </tbody>
                    </table>
                    <div class="day-total-display">
                        <span id="total_display_${dayKey}">Tổng: 0 tiết</span>
                        <div class="actions">
                            <!-- Khi lưu ngày, chỉ lưu ngày đó. Thêm nút Xóa (đã có ở trên) -->
                        </div>
                    </div>
                </div>`;
            });
            formContainer.innerHTML = html;

            // Sau khi tạo khung HTML, điền dữ liệu vào từng ngày
            DAYS.forEach((dayKey, index) => {
                const dayDataFromDB = (scheduleMap && scheduleMap[myUserId] && scheduleMap[myUserId][dayKey]) || [];
                renderDayRows(dayKey, dayDataFromDB);
            });
        }

        // Hàm tạo các dòng (cặp tiết) cho một ngày cụ thể
        function renderDayRows(dayKey, data) {
            const tbody = document.getElementById(`tbody_${dayKey}`);
            if(!tbody) return;
            
            // Nếu dữ liệu rỗng, tạo mặc định 3 dòng trống (PERIODS I, II, III)
            let rowsData = data;
            if(!rowsData || rowsData.length === 0) {
                rowsData = PERIODS.map(p => ({ period: p, subject: '', class: '', room: '', slots: SLOTS_PER_PERIOD }));
            }

            let html = '';
            rowsData.forEach((entry, idx) => {
                const periodVal = entry.period || PERIODS[idx] || 'I';
                // Tạo dropdown cặp tiết (cho phép chọn)
                const periodOpts = ['I', 'II', 'III', 'IV'].map(p => `<option value="${p}" ${p === periodVal ? 'selected' : ''}>${p}</option>`).join('');
                
                html += `<tr class="period-row">
                    <td data-label="Cặp">
                        <select class="period-select">${periodOpts}</select>
                    </td>
                    <td data-label="Môn">
                        <select class="subject-select" onchange="toggleCustomInput(this)">
                            <option value="">Chọn môn...</option>
                            ${globalCatalogs.subjects.map(s => `<option value="${s}" ${s === entry.subject ? 'selected' : ''}>${s}</option>`).join('')}
                            <option value="__CUSTOM__" ${entry.subject && !globalCatalogs.subjects.includes(entry.subject) ? 'selected' : ''}>✏️ Nhập tên khác</option>
                        </select>
                        <input type="text" class="d-none custom-input mt-1" placeholder="Tên môn khác..." value="${entry.subject && !globalCatalogs.subjects.includes(entry.subject) ? entry.subject : ''}">
                    </td>
                    <td data-label="Lớp">
                        <select class="class-select" onchange="toggleCustomInput(this)">
                            <option value="">Chọn lớp...</option>
                            ${globalCatalogs.classes.map(c => `<option value="${c}" ${c === entry.class ? 'selected' : ''}>${c}</option>`).join('')}
                            <option value="__CUSTOM__" ${entry.class && !globalCatalogs.classes.includes(entry.class) ? 'selected' : ''}>✏️ Nhập tên khác</option>
                        </select>
                        <input type="text" class="d-none custom-input mt-1" placeholder="Tên lớp khác..." value="${entry.class && !globalCatalogs.classes.includes(entry.class) ? entry.class : ''}">
                    </td>
                    <td data-label="Phòng">
                        <select class="room-select" onchange="toggleCustomInput(this)">
                            <option value="">Chọn phòng...</option>
                            ${globalCatalogs.rooms.map(r => `<option value="${r}" ${r === entry.room ? 'selected' : ''}>${r}</option>`).join('')}
                            <option value="__CUSTOM__" ${entry.room && !globalCatalogs.rooms.includes(entry.room) ? 'selected' : ''}>✏️ Nhập tên khác</option>
                        </select>
                        <input type="text" class="d-none custom-input mt-1" placeholder="Tên phòng khác..." value="${entry.room && !globalCatalogs.rooms.includes(entry.room) ? entry.room : ''}">
                    </td>
                    <td data-label="Tiết" style="text-align:center;">
                        <input type="number" class="slots-input" value="${entry.slots || SLOTS_PER_PERIOD}" min="0" style="width: 50px; text-align:center;">
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            updateDayTotal(dayKey);
        }

        // Cập nhật lại dữ liệu cho một ngày cụ thể (Gọi khi thêm/xóa dòng)
        function addPeriodRow(dayKey) {
            const tbody = document.getElementById(`tbody_${dayKey}`);
            // Thêm một dòng mới với dữ liệu mặc định
            const newRow = document.createElement('tr');
            newRow.className = 'period-row';
            const periodOpts = ['I', 'II', 'III', 'IV'].map(p => `<option value="${p}">${p}</option>`).join('');
            newRow.innerHTML = `
                <td data-label="Cặp"><select class="period-select">${periodOpts}</select></td>
                <td data-label="Môn">
                    <select class="subject-select" onchange="toggleCustomInput(this)">
                        <option value="">Chọn môn...</option>${globalCatalogs.subjects.map(s => `<option value="${s}">${s}</option>`).join('')}
                        <option value="__CUSTOM__">✏️ Nhập tên khác</option>
                    </select>
                    <input type="text" class="d-none custom-input mt-1" placeholder="Tên môn khác...">
                </td>
                <td data-label="Lớp">
                    <select class="class-select" onchange="toggleCustomInput(this)">
                        <option value="">Chọn lớp...</option>${globalCatalogs.classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        <option value="__CUSTOM__">✏️ Nhập tên khác</option>
                    </select>
                    <input type="text" class="d-none custom-input mt-1" placeholder="Tên lớp khác...">
                </td>
                <td data-label="Phòng">
                    <select class="room-select" onchange="toggleCustomInput(this)">
                        <option value="">Chọn phòng...</option>${globalCatalogs.rooms.map(r => `<option value="${r}">${r}</option>`).join('')}
                        <option value="__CUSTOM__">✏️ Nhập tên khác</option>
                    </select>
                    <input type="text" class="d-none custom-input mt-1" placeholder="Tên phòng khác...">
                </td>
                <td data-label="Tiết" style="text-align:center;">
                    <input type="number" class="slots-input" value="${SLOTS_PER_PERIOD}" min="0" style="width: 50px; text-align:center;">
                </td>
            `;
            tbody.appendChild(newRow);
            updateDayTotal(dayKey);
        }

        // Xóa 1 dòng cặp tiết (Gọi từ nút Xóa trên thanh header? Không có, nhưng user có thể chọn xóa data)
        // Hàm lưu ngày
        function saveDay(dayKey) {
            const tbody = document.getElementById(`tbody_${dayKey}`);
            const rows = tbody.querySelectorAll('.period-row');
            let dayArray = [];
            rows.forEach(row => {
                let period = row.querySelector('.period-select').value;
                let subject = getSelectValue(row, '.subject-select');
                let className = getSelectValue(row, '.class-select');
                let room = getSelectValue(row, '.room-select');
                let slots = parseInt(row.querySelector('.slots-input').value) || 0;
                if(period && subject) {
                    dayArray.push({ period, subject, class: className, room, slots });
                }
            });
            updateUserDataDay(dayKey, dayArray);
        }

        function clearDay(dayKey) {
            if(!confirm(`Bạn có chắc muốn xóa toàn bộ dữ liệu của ngày này?`)) return;
            updateUserDataDay(dayKey, []);
        }

        async function updateUserDataDay(dayKey, dataArray) {
            if(!currentUser) return;
            try {
                const rowRef = db.collection('weeks').doc(`week_${new Date().getFullYear()}_${currentWeek}`).collection('rows').doc(myUserId);
                await rowRef.update({ [dayKey]: dataArray });
                alert(`✅ Đã lưu ngày ${dayKey.replace('_', ' ')} thành công!`);
                // Cập nhật local UI ngay lập tức
                renderDayRows(dayKey, dataArray);
                loadData(); // Cập nhật bảng tổng hợp
            } catch(e) {
                alert("Lỗi lưu dữ liệu: " + e.message);
            }
        }

        // Hàm lưu cả tuần
        async function saveAllWeekData() {
            if(!currentUser) return;
            let allData = {};
            let hasError = false;
            
            DAYS.forEach(dayKey => {
                const tbody = document.getElementById(`tbody_${dayKey}`);
                if(!tbody) return;
                const rows = tbody.querySelectorAll('.period-row');
                let dayArray = [];
                rows.forEach(row => {
                    let period = row.querySelector('.period-select').value;
                    let subject = getSelectValue(row, '.subject-select');
                    let className = getSelectValue(row, '.class-select');
                    let room = getSelectValue(row, '.room-select');
                    let slots = parseInt(row.querySelector('.slots-input').value) || 0;
                    if(period && subject) {
                        dayArray.push({ period, subject, class: className, room, slots });
                    }
                });
                allData[dayKey] = dayArray;
            });

            if(hasError) return alert("Có lỗi dữ liệu. Vui lòng kiểm tra lại.");
            
            try {
                const rowRef = db.collection('weeks').doc(`week_${new Date().getFullYear()}_${currentWeek}`).collection('rows').doc(myUserId);
                await rowRef.update(allData);
                alert("✅ Đã lưu lịch cả tuần thành công!");
                loadData();
            } catch(e) {
                alert("Lỗi lưu cả tuần: " + e.message);
            }
        }

        function getSelectValue(row, selector) {
            const sel = row.querySelector(selector);
            if(sel.value === '__CUSTOM__') {
                const customInput = row.querySelector(selector + ' + .custom-input');
                return customInput ? customInput.value : '';
            }
            return sel.value;
        }

        function updateDayTotal(dayKey) {
            const tbody = document.getElementById(`tbody_${dayKey}`);
            const rows = tbody.querySelectorAll('.period-row');
            let total = 0;
            rows.forEach(row => {
                let s = parseInt(row.querySelector('.slots-input').value) || 0;
                total += s;
            });
            document.getElementById(`total_display_${dayKey}`).innerHTML = `Tổng: ${total} tiết`;
        }

        // --- 7. RENDER BẢNG TỔNG HỢP ---
        function renderTable(users, scheduleMap) {
            const container = document.getElementById('scheduleTableContainer');
            let html = `<table><thead><tr><th style="min-width:150px;">Giảng Viên</th>${DISPLAY_DAYS.map(d => `<th>${d}</th>`).join('')}<th>Tổng tiết</th></tr></thead><tbody>`;
            let grandTotals = {};

            users.forEach(user => {
                const userData = scheduleMap[user.id] || {};
                html += `<tr class="teacher-row"><td>${user.fullname || 'GV'}</td>`;
                let lecturerTotal = 0;
                
                DAYS.forEach(day => {
                    const dayArr = userData[day] || []; 
                    let displayHtml = '';
                    let dayTotal = 0;

                    if(Array.isArray(dayArr) && dayArr.length > 0) {
                        dayArr.forEach(entry => {
                            if(entry.period && entry.subject) {
                                displayHtml += `<div class="entry-item"><b>[Cặp ${entry.period}]</b> ${entry.subject}<br><span style="font-size:12px; color:#666;">Lớp: ${entry.class || '-'} - Phòng: ${entry.room || '-'}</span></div>`;
                                dayTotal += parseInt(entry.slots) || 0; 
                            }
                        });
                    }
                    if(!displayHtml) displayHtml = '<span style="color:#ccc;">-</span>';
                    lecturerTotal += dayTotal;
                    if(!grandTotals[day]) grandTotals[day] = 0;
                    grandTotals[day] += dayTotal;
                    html += `<td class="entry-cell">${displayHtml}<div style="margin-top:5px;font-size:11px;color:#e67e22;">Tổng: ${dayTotal}</div></td>`;
                });
                html += `<td class="total-cell">${lecturerTotal}</td></tr>`;
            });

            html += `<tr class="grand-total-row"><td>TỔNG CỘNG</td>`;
            let finalTotal = 0;
            DAYS.forEach(day => { const t = grandTotals[day] || 0; finalTotal += t; html += `<td>${t}</td>`; });
            html += `<td>${finalTotal}</td></tr></tbody></table>`;
            container.innerHTML = html;
        }

        // --- 8. CHỨC NĂNG ĐỔI TÊN ---
        function openChangeNameModal() {
            document.getElementById('newDisplayName').value = currentUser.displayName || '';
            document.getElementById('changeNameModal').style.display = 'flex';
        }

        async function updateMyName() {
            const newName = document.getElementById('newDisplayName').value.trim();
            if(!newName) return alert("Vui lòng nhập tên mới!");
            try {
                await currentUser.updateProfile({ displayName: newName });
                await db.collection('users').doc(myUserId).update({ fullname: newName });
                const rowRef = db.collection('weeks').doc(`week_${new Date().getFullYear()}_${currentWeek}`).collection('rows').doc(myUserId);
                await rowRef.update({ fullname: newName });
                document.getElementById('changeNameModal').style.display = 'none';
                alert("✅ Đã đổi tên thành công!");
                location.reload();
            } catch(e) { alert("Lỗi khi đổi tên: " + e.message); }
        }

        // Tiện ích bổ trợ cho Form
        function toggleCustomInput(selectEl) {
            const customInput = selectEl.parentElement.querySelector('.custom-input');
            if(selectEl.value === '__CUSTOM__') {
                customInput.classList.remove('d-none');
                selectEl.classList.add('d-none');
                customInput.focus();
            } else {
                // Quay lại chọn từ list (nếu cần)
                // Code này giữ trạng thái bình thường
            }
        }
    </script>
</body>
